name: Publish to ClawHub

# Publishes the plugin package to ClawHub when a GitHub Release is published
# (version taken from the release tag), or on manual dispatch. npm publishing
# stays manual by policy (see PUBLISHING.md) — this workflow covers ClawHub only.
#
# Publishes the built package folder from the CI checkout (the build step
# needs devDependencies), attaching the release tag + commit as source
# metadata so ClawHub links the release to the public repo.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 1.4.1). Defaults to the latest tag."
        required: false

env:
  PACKAGE_NAME: "@drakon-systems/multi-clawd"
  PACKAGE_OWNER: drakon-systems

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies and ClawHub CLI
        # npm install, not npm ci: this repo gitignores package-lock.json,
        # and npm ci refuses to run without a lockfile.
        run: |
          npm install --no-audit --no-fund
          npm i -g clawhub

      - name: Publish plugin package
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_BODY: ${{ github.event.release.body }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          test -n "$CLAWHUB_TOKEN" || { echo "CLAWHUB_TOKEN secret is not set"; exit 1; }
          clawhub login --token "$CLAWHUB_TOKEN" --label "github-actions ${GITHUB_REPOSITORY}"

          TAG="${RELEASE_TAG:-${INPUT_VERSION:-$(git describe --tags --abbrev=0)}}"
          VERSION="${TAG#v}"
          CHANGELOG="${RELEASE_BODY:-Release v${VERSION} — see CHANGELOG.md in the source repo.}"

          clawhub --no-input package publish . \
            --family code-plugin \
            --name "$PACKAGE_NAME" \
            --display-name "multi-clawd" \
            --owner "$PACKAGE_OWNER" \
            --version "$VERSION" \
            --changelog "$CHANGELOG" \
            --source-repo "$GITHUB_REPOSITORY" \
            --source-ref "$TAG" \
            --source-commit "$GITHUB_SHA"

          echo "Published $PACKAGE_NAME@$VERSION to ClawHub"
